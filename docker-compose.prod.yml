services:
  mysql:
    image: mysql:8.0
    container_name: toutiao_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-toutiao}
      MYSQL_PORT: 3306
      MYSQL_HOST: mysql
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: toutiao_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: ghcr.io/${IMAGE_NAMESPACE}/toutiao-api:${IMAGE_TAG:-latest}
    container_name: toutiao_api
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/${IMAGE_NAMESPACE}/toutiao-frontend:${IMAGE_TAG:-latest}
    container_name: toutiao_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  mysql_data:
  redis_data:
