name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: toutiao-api
  FRONTEND_IMAGE: toutiao-frontend

jobs:
  build-and-push:
    name: Build and push Docker images
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_namespace: ${{ steps.meta.outputs.image_namespace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set image tag
        id: meta
        run: |
          echo "image_tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "image_namespace=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_namespace }}/${{ env.API_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_namespace }}/${{ env.API_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_AI_API_ENDPOINT=${{ vars.VITE_AI_API_ENDPOINT }}
            VITE_AI_MODEL=${{ vars.VITE_AI_MODEL }}
          secrets: |
            VITE_AI_API_KEY=${{ secrets.VITE_AI_API_KEY }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_namespace }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_namespace }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to server
    needs: build-and-push
    if: vars.ENABLE_SSH_DEPLOY == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy Docker images
        env:
          IMAGE_NAMESPACE: ${{ needs.build-and-push.outputs.image_namespace }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            set -e
            cd '${{ secrets.APP_DIR }}'
            git pull --ff-only origin main
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
            IMAGE_NAMESPACE='${IMAGE_NAMESPACE}' IMAGE_TAG='${IMAGE_TAG}' docker compose -f docker-compose.prod.yml pull
            IMAGE_NAMESPACE='${IMAGE_NAMESPACE}' IMAGE_TAG='${IMAGE_TAG}' docker compose -f docker-compose.prod.yml up -d
          "
